apiVersion: apps/v1
kind: Deployment
metadata:
  name: estimathon-scoreboard
  namespace: bmt
spec:
  replicas: 1
  selector:
    matchLabels:
      app: estimathon-scoreboard
  template:
    metadata:
      labels:
        app: estimathon-scoreboard
    spec:
      containers:
      - env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              key: uri
              name: estimathon-scoreboard-postgres-app
        envFrom:
        - secretRef:
            name: estimathon-scoreboard
        image: ghcr.io/berkeleymt/estimathon-scoreboard:latest
        name: estimathon-scoreboard
        ports:
        - containerPort: 8080
        resources:
          limits:
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 64Mi
      imagePullSecrets:
      - name: ghcr-auth
